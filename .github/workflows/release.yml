name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (must start with v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and validate release tag
        run: |
          PACKAGE_VERSION=$(bun --print "require('./package.json').version")

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_INPUT="${{ github.event.inputs.tag }}"
            if [ -z "$TAG_INPUT" ]; then
              echo "workflow_dispatch requires the tag input"
              exit 1
            fi
            if [[ ! "$TAG_INPUT" =~ ^v ]]; then
              echo "Tag input must start with v (got: $TAG_INPUT)"
              exit 1
            fi
            TAG_NAME="$TAG_INPUT"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v ]]; then
            echo "Release tag must start with v (got: $TAG_NAME)"
            exit 1
          fi

          TAG_VERSION="${TAG_NAME#v}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "RELEASE_TAG=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Export build metadata
        run: |
          echo "OTD_VERSION=$(bun --print \"require('./package.json').version\")" >> "$GITHUB_ENV"
          echo "OTD_BUILD_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Package build artifacts
        run: tar -czf openapi-to-document-v${OTD_VERSION}.tar.gz dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*
            openapi-to-document-v${{ env.OTD_VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
