name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (must start with v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve and validate release tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_INPUT="${{ github.event.inputs.tag }}"
            if [ -z "$TAG_INPUT" ]; then
              echo "workflow_dispatch requires the tag input"
              exit 1
            fi
            if [[ ! "$TAG_INPUT" =~ ^v ]]; then
              echo "Tag input must start with v (got: $TAG_INPUT)"
              exit 1
            fi
            TAG_NAME="$TAG_INPUT"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v ]]; then
            echo "Release tag must start with v (got: $TAG_NAME)"
            exit 1
          fi

          echo "RELEASE_TAG=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Ensure release tag exists
        run: |
          git fetch --force --tags origin

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            git checkout --detach "$RELEASE_TAG"
            exit 0
          fi

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "$RELEASE_TAG"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
git tag "$RELEASE_TAG"
if ! git push origin "refs/tags/$RELEASE_TAG"; then
  if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null; then
    git fetch --force --tags origin
  else
    echo "Failed to push tag $RELEASE_TAG to origin"
    exit 1
  fi
fi
git checkout --detach "$RELEASE_TAG"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate tag against package version
        run: |
          PACKAGE_VERSION=$(bun --print "require('./package.json').version")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Export build metadata
        run: |
          OTD_VERSION=$(bun --print "require('./package.json').version")
          OTD_BUILD_DATE=$(date -u +%F)

          {
            echo "OTD_VERSION=$OTD_VERSION"
            echo "OTD_BUILD_DATE=$OTD_BUILD_DATE"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Build executables
        run: bun run build:exe

      - name: Package build artifacts
        run: tar -czf openapi-to-document-v${OTD_VERSION}.tar.gz dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          files: |
            dist/index.js
            dist/index.html
            dist/openapi-to-document.js
            dist/exe/otd-linux-x64
            dist/exe/otd-linux-arm64
            dist/exe/otd-darwin-x64
            dist/exe/otd-darwin-arm64
            dist/exe/otd-windows-x64.exe
            openapi-to-document-v${{ env.OTD_VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        run: |
          gh release edit "$RELEASE_TAG" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
