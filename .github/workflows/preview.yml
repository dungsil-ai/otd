name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - '.github/workflows/preview.yml'
      - 'src/writer/**'
      - 'src/transformer/**'
      - 'src/models/**'
      - 'src/static/**'
      - 'scripts/build.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'tests/fixtures/complete.yaml'

permissions:
  contents: read

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      excel-artifact-id: ${{ steps.upload-excel.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static preview page
        run: bun run build

      - name: Prepare Pages preview
        run: |
          mkdir -p pages-preview
          cp dist/index.html pages-preview/index.html
          cp dist/openapi-to-document.js pages-preview/openapi-to-document.js

      - name: Upload Pages preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-preview
          path: pages-preview/
          if-no-files-found: error

      - name: Generate Excel from complete.yaml
        run: bun run src/index.ts tests/fixtures/complete.yaml -o complete-preview.xlsx -f

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        id: upload-excel
        with:
          name: complete-preview
          path: complete-preview.xlsx
          if-no-files-found: error

  deploy-preview:
    needs: build-preview
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Pages preview artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-preview
          path: pages-preview/

      - name: Deploy Pages preview to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_DIR: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git init gh-pages-worktree
          cd gh-pages-worktree
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          rm -rf "$PREVIEW_DIR"
          mkdir -p "$PREVIEW_DIR"
          cp -R ../pages-preview/. "$PREVIEW_DIR/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$PREVIEW_DIR"

          if git diff --cached --quiet; then
            echo "배포할 미리보기 변경사항이 없습니다: $PREVIEW_DIR"
            exit 0
          fi

          git commit -m "PR #${{ github.event.pull_request.number }} 미리보기 페이지 배포"
          git push origin HEAD:gh-pages

  comment-preview:
    needs: [build-preview, deploy-preview]
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ needs.build-preview.outputs.excel-artifact-id }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        with:
          script: |
            const artifactId = process.env.ARTIFACT_ID;
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`;
            const configuredBaseUrl = process.env.PAGES_BASE_URL?.trim().replace(/\/+$/, '');
            const fallbackBaseUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const previewUrl = `${configuredBaseUrl || fallbackBaseUrl}/preview/pr-${context.issue.number}/`;
            const body = [
              '📊 **PR 미리보기가 생성되었습니다**',
              '',
              `[🌐 정적 변환기 미리보기](${previewUrl})`,
              `[📥 complete-preview.xlsx 다운로드](${downloadUrl})`,
              '',
              `> 정적 페이지는 \`gh-pages\` 브랜치의 \`preview/pr-${context.issue.number}\` 경로에 배포됩니다.`,
              `> Excel 파일은 \`tests/fixtures/complete.yaml\` 기반으로 생성됨 (Run: ${context.runId})`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body && c.body.includes('PR 미리보기가 생성되었습니다')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Remove Pages preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_DIR: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git init gh-pages-worktree
          cd gh-pages-worktree
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if ! git fetch --depth=1 origin gh-pages; then
            echo "gh-pages 브랜치가 없어 정리할 미리보기 디렉터리가 없습니다."
            exit 0
          fi

          git checkout gh-pages
          if [ ! -d "$PREVIEW_DIR" ]; then
            echo "삭제할 미리보기 디렉터리가 없습니다: $PREVIEW_DIR"
            exit 0
          fi

          rm -rf "$PREVIEW_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$PREVIEW_DIR"

          if git diff --cached --quiet; then
            echo "정리할 미리보기 변경사항이 없습니다: $PREVIEW_DIR"
            exit 0
          fi

          git commit -m "PR #${{ github.event.pull_request.number }} 미리보기 페이지 정리"
          git push origin HEAD:gh-pages
