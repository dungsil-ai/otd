name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'src/writer/**'
      - 'src/transformer/**'
      - 'src/models/**'
      - 'src/static/**'
      - 'scripts/build.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'tests/fixtures/complete.yaml'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static preview page
        run: bun run build

      - name: Prepare Pages preview
        run: |
          mkdir -p pages-preview
          cp dist/index.html pages-preview/index.html
          cp dist/openapi-to-document.js pages-preview/openapi-to-document.js

      - name: Deploy Pages preview to gh-pages
        if: github.event.pull_request.head.repo.fork == false
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-preview
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: PR #${{ github.event.pull_request.number }} 미리보기 페이지 배포

      - name: Generate Excel from complete.yaml
        run: bun run src/index.ts tests/fixtures/complete.yaml -o complete-preview.xlsx -f

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: complete-preview
          path: complete-preview.xlsx

      - name: Comment on PR
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        with:
          script: |
            const artifactId = process.env.ARTIFACT_ID;
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/preview/pr-${context.issue.number}/`;
            const body = [
              '📊 **PR 미리보기가 생성되었습니다**',
              '',
              `[🌐 정적 변환기 미리보기](${previewUrl})`,
              `[📥 complete-preview.xlsx 다운로드](${downloadUrl})`,
              '',
              `> 정적 페이지는 \`gh-pages\` 브랜치의 \`preview/pr-${context.issue.number}\` 경로에 배포됩니다.`,
              `> Excel 파일은 \`tests/fixtures/complete.yaml\` 기반으로 생성됨 (Run: ${context.runId})`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body && c.body.includes('PR 미리보기가 생성되었습니다')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Remove Pages preview
        run: |
          cd gh-pages
          PREVIEW_DIR="preview/pr-${{ github.event.pull_request.number }}"
          if [ ! -d "$PREVIEW_DIR" ]; then
            echo "삭제할 미리보기 디렉터리가 없습니다: $PREVIEW_DIR"
            exit 0
          fi

          rm -rf "$PREVIEW_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$PREVIEW_DIR"
          git commit -m "PR #${{ github.event.pull_request.number }} 미리보기 페이지 정리"
          git push origin gh-pages
