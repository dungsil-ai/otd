name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'src/writer/**'
      - 'src/transformer/**'
      - 'src/models/**'
      - 'src/static/**'
      - 'scripts/build.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'tests/fixtures/complete.yaml'

permissions:
  contents: read

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      excel-artifact-id: ${{ steps.upload-excel.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static preview page
        run: bun run build

      - name: Prepare Pages preview
        run: |
          mkdir -p pages-preview
          cp dist/index.html pages-preview/index.html
          cp dist/openapi-to-document.js pages-preview/openapi-to-document.js

      - name: Upload Pages preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-preview
          path: pages-preview/
          if-no-files-found: error

      - name: Generate Excel from complete.yaml
        run: bun run src/index.ts tests/fixtures/complete.yaml -o complete-preview.xlsx -f

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        id: upload-excel
        with:
          name: complete-preview
          path: complete-preview.xlsx
          if-no-files-found: error

  deploy-preview:
    needs: build-preview
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Pages preview artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-preview
          path: pages-preview/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-preview/

      - name: Deploy Pages preview with GitHub Actions
        id: deployment
        uses: actions/deploy-pages@v4

  comment-preview:
    needs: [build-preview, deploy-preview]
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ needs.build-preview.outputs.excel-artifact-id }}
          PAGE_URL: ${{ needs.deploy-preview.outputs.page-url }}
        with:
          script: |
            const artifactId = process.env.ARTIFACT_ID;
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`;
            const previewUrl = process.env.PAGE_URL;
            const body = [
              '📊 **PR 미리보기가 생성되었습니다**',
              '',
              `[🌐 정적 변환기 미리보기](${previewUrl})`,
              `[📥 complete-preview.xlsx 다운로드](${downloadUrl})`,
              '',
              `> 정적 페이지는 GitHub Actions Pages 배포로 생성됨 (Run: ${context.runId})`,
              `> Excel 파일은 \`tests/fixtures/complete.yaml\` 기반으로 생성됨 (Run: ${context.runId})`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body && c.body.includes('PR 미리보기가 생성되었습니다')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
