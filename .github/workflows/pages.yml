name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - 'src/writer/**'
      - 'src/transformer/**'
      - 'src/models/**'
      - 'src/static/**'
      - 'scripts/build.mjs'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static Pages site
        run: bun run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp dist/index.html pages/index.html
          cp dist/openapi-to-document.js pages/openapi-to-document.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
