name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore: 
      - ".github/**"
      - "scripts/**"
      - "tests/**"
      - ".editorconfig"
      - ".gitignore"
      - "*.md"
      - "*.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare pages artifact
        run: |
          mkdir -p pages
          cp dist/index.html pages/index.html
          cp dist/openapi-to-document.js pages/openapi-to-document.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
