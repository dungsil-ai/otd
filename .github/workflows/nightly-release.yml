name: Nightly Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.nightly-change-check.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for nightly changes
        id: nightly-change-check
        run: |
          LATEST_NIGHTLY_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' "refs/tags/nightly-*" | sed -n '1p')

          if [ -z "$LATEST_NIGHTLY_TAG" ]; then
            echo "No previous nightly tag found; creating nightly release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_NIGHTLY_SHA=$(git rev-list -n 1 "$LATEST_NIGHTLY_TAG")
          CURRENT_SHA=$(git rev-parse HEAD)

          if [ "$LATEST_NIGHTLY_SHA" = "$CURRENT_SHA" ]; then
            echo "No commits since $LATEST_NIGHTLY_TAG ($CURRENT_SHA); skipping nightly release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changes detected since $LATEST_NIGHTLY_TAG ($LATEST_NIGHTLY_SHA..$CURRENT_SHA); creating nightly release."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  nightly:
    needs: changes
    if: needs.changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Export nightly metadata
        run: |
          OTD_VERSION=$(bun --print "require('./package.json').version")
          OTD_BUILD_DATE=$(date -u +%F)
          NIGHTLY_TAG="nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"

          {
            echo "OTD_VERSION=$OTD_VERSION"
            echo "OTD_BUILD_DATE=$OTD_BUILD_DATE"
            echo "NIGHTLY_TAG=$NIGHTLY_TAG"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Build executables
        run: bun run build:exe

      - name: Package nightly build
        run: tar -czf openapi-to-document-${NIGHTLY_TAG}.tar.gz dist/

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          name: Nightly ${{ env.NIGHTLY_TAG }}
          prerelease: true
          draft: true
          generate_release_notes: true
          files: |
            dist/index.js
            dist/index.html
            dist/openapi-to-document.js
            dist/exe/otd-linux-x64
            dist/exe/otd-linux-arm64
            dist/exe/otd-darwin-x64
            dist/exe/otd-darwin-arm64
            dist/exe/otd-windows-x64.exe
            openapi-to-document-${{ env.NIGHTLY_TAG }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Nightly Release
        run: |
          gh release edit "$NIGHTLY_TAG" --draft=false --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
