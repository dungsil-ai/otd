name: Nightly Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Export nightly metadata
        run: |
          echo "OTD_VERSION=$(bun --print \"require('./package.json').version\")" >> "$GITHUB_ENV"
          echo "OTD_BUILD_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "NIGHTLY_TAG=nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Package nightly build
        run: tar -czf openapi-to-document-nightly-${NIGHTLY_TAG}.tar.gz dist/

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          name: Nightly ${{ env.NIGHTLY_TAG }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*
            openapi-to-document-nightly-${{ env.NIGHTLY_TAG }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
