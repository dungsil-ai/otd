<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTD Static HTML Converter</title>
    <style>
      body {
        max-width: 960px;
        margin: 32px auto;
        padding: 0 16px 32px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        color: #1f2937;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 16px 0;
      }
      textarea {
        width: 100%;
        min-height: 280px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        padding: 10px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>OpenAPI → XLSX 명세서 변환기</h1>
    <p>CLI와 동일한 변환 로직으로 브라우저에서 XLSX 명세서를 생성합니다.</p>

    <div class="controls">
      <input id="sourceFile" type="file" accept=".yaml,.yml,.json" />
      <button id="convertBtn" type="button">XLSX 생성</button>
    </div>

    <textarea id="sourceText" placeholder="OpenAPI YAML/JSON 내용을 붙여넣으세요."></textarea>
    <p id="status"></p>

    <script type="module" src="./openapi-to-document.js"></script>
  </body>
</html>
