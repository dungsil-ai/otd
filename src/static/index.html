<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTD Static HTML Converter</title>
    <style>
      :root {
        color-scheme: light;
        --border: #d1d5db;
        --primary: #4472c4;
        --surface: #ffffff;
        --surface-muted: #f8fafc;
        --text-muted: #6b7280;
      }
      body {
        max-width: 1100px;
        margin: 32px auto;
        padding: 0 16px 32px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        color: #1f2937;
        background: #f3f6fb;
      }
      .page-header {
        margin-bottom: 20px;
      }
      .page-header p {
        color: var(--text-muted);
        margin-top: 4px;
      }
      .input-panel {
        background: var(--surface);
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
        padding: 20px;
      }
      .input-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }
      .input-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
      }
      .input-card label,
      .editor-label {
        font-weight: 700;
      }
      .input-card p,
      .editor-help {
        margin: 0;
        color: var(--text-muted);
        font-size: 13px;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      input[type="url"],
      input[type="file"] {
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 10px;
        box-sizing: border-box;
        background: #fff;
      }
      .input-row input[type="url"] {
        flex: 1;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 16px 0 0;
      }
      .editor-preview-stack {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .editor-header {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      textarea {
        width: 100%;
        min-height: 320px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 12px;
        resize: vertical;
      }
      button {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      #status {
        min-height: 1.5em;
      }
      .error {
        color: #b91c1c;
      }
      @media (max-width: 760px) {
        body {
          margin-top: 20px;
        }
        .input-grid {
          grid-template-columns: 1fr;
        }
        .input-row {
          flex-direction: column;
        }
      }

      /* ── 미리 보기 ── */
      #preview {
        margin-top: 32px;
      }
      .preview-tabs {
        display: flex;
        flex-wrap: nowrap;
        gap: 4px;
        border-bottom: 2px solid #4472c4;
        margin-bottom: 0;
        padding-bottom: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
      }
      .preview-tab-btn {
        flex: 0 0 auto;
        padding: 6px 14px;
        border: 1px solid #d1d5db;
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        background: #f9fafb;
        cursor: pointer;
        font-size: 13px;
        color: #374151;
        margin-bottom: -2px;
      }
      .preview-tab-btn.active {
        background: #fff;
        border-color: #4472c4;
        border-bottom-color: #fff;
        font-weight: bold;
        color: #4472c4;
      }
      .preview-panels {
        border: 1px solid #4472c4;
        border-top: none;
        padding: 16px;
        background: #fff;
      }
      .preview-panel {
        display: none;
      }
      .preview-panel.active {
        display: block;
      }

      /* ── 테이블 ── */
      .preview-table {
        border-collapse: collapse;
        width: 100%;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .preview-table th,
      .preview-table td {
        border: 1px solid #d1d5db;
        padding: 5px 8px;
        text-align: left;
        vertical-align: top;
        white-space: pre-wrap;
      }
      .preview-table thead th {
        background: #d9e2f3;
        font-weight: bold;
        text-align: center;
      }
      .preview-table tbody th {
        background: #f2f5fb;
        font-weight: bold;
        white-space: nowrap;
      }
      .preview-table td.center {
        text-align: center;
      }

      /* ── 엔드포인트 블록 ── */
      .endpoint-block {
        border: 2px solid #4472c4;
        border-radius: 4px;
        margin-bottom: 24px;
        overflow: hidden;
      }
      .endpoint-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #eef2fb;
        border-bottom: 1px solid #4472c4;
      }
      .endpoint-path {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        font-weight: bold;
      }
      .endpoint-meta {
        margin: 8px 12px;
        width: calc(100% - 24px);
      }

      /* ── 섹션/서브섹션 헤더 ── */
      .section-title {
        background: #4472c4;
        color: #fff;
        font-weight: bold;
        padding: 6px 12px;
      }
      .subsection-title {
        background: #4472c4;
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        padding: 4px 12px;
        margin: 8px 12px 0;
      }
      .empty-note {
        font-style: italic;
        color: #6b7280;
        margin: 4px 12px;
        font-size: 13px;
      }
      .endpoint-block .preview-table,
      .endpoint-block .empty-note {
        margin: 0 12px 8px;
        width: calc(100% - 24px);
      }

      /* ── 샘플 ── */
      .sample-title {
        background: #d9e2f3;
        font-size: 12px;
        font-weight: bold;
        padding: 3px 12px;
        margin: 8px 12px 0;
      }
      .sample-code {
        background: #f8f9fa;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        font-size: 12px;
        padding: 8px 10px;
        margin: 0 12px 8px;
        overflow-x: auto;
        white-space: pre;
      }

      /* ── HTTP 메서드 배지 ── */
      .method-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        color: #fff;
        white-space: nowrap;
        min-width: 52px;
        text-align: center;
      }
      .method-get     { background: #28a745; }
      .method-post    { background: #007bff; }
      .method-put     { background: #ffc107; color: #1f2937; }
      .method-delete  { background: #dc3545; }
      .method-patch   { background: #6f42c1; }
      .method-head    { background: #6c757d; }
      .method-options { background: #6c757d; }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>OpenAPI → XLSX 명세서 변환기</h1>
      <p>파일 업로드, URL 불러오기, 직접 입력으로 OpenAPI v3 문서를 XLSX 명세서로 변환합니다.</p>
    </header>

    <main class="input-panel">
      <div class="input-grid">
        <section class="input-card" aria-labelledby="fileInputTitle">
          <label id="fileInputTitle" for="sourceFile">파일에서 불러오기</label>
          <p>로컬 YAML, YML, JSON 파일을 선택하면 아래 입력 창과 미리 보기가 갱신됩니다.</p>
          <input id="sourceFile" type="file" accept=".yaml,.yml,.json" aria-label="OpenAPI 파일 선택" />
        </section>

        <section class="input-card" aria-labelledby="urlInputTitle">
          <label id="urlInputTitle" for="sourceUrl">URL에서 불러오기</label>
          <p>접근 가능한 OpenAPI 문서 URL을 입력한 뒤 불러오세요.</p>
          <div class="input-row">
            <input id="sourceUrl" type="url" inputmode="url" placeholder="https://example.com/openapi.yaml" aria-label="OpenAPI 문서 URL" />
            <button id="loadUrlBtn" type="button">URL 불러오기</button>
          </div>
        </section>
      </div>

      <div class="editor-preview-stack">
        <div>
          <div class="editor-header">
            <label class="editor-label" for="sourceText">직접 입력</label>
            <span class="editor-help">붙여넣거나 위 입력 방식으로 불러온 내용을 확인할 수 있습니다.</span>
          </div>
          <textarea id="sourceText" aria-label="OpenAPI 문서 내용" placeholder="OpenAPI YAML/JSON 내용을 붙여넣으세요."></textarea>
        </div>
        <div id="preview" hidden></div>
      </div>

      <div class="controls">
        <p id="status" role="status" aria-live="polite"></p>
        <button id="convertBtn" class="primary" type="button">XLSX 생성</button>
      </div>
    </main>

    <script type="module" src="./openapi-to-document.js"></script>
  </body>
</html>
